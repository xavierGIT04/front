name: zem_taxi
description: Zém & Taxi - Votre transport au Togo
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0
  http_parser: ^4.0.0

  # Stockage local
  shared_preferences: ^2.2.2

  # Sélection d'images
  image_picker: ^1.0.7

  # Formatage des dates (utilisé dans notifications_screen.dart)
  intl: ^0.19.0

  # UI
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  pin_code_fields: ^8.0.1

  # Mapping & Geolocation
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
